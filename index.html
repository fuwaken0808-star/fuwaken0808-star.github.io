<!DOCTYPE html>
<html lang="zh-Hant" data-theme="midnight" data-layout="classic">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'none'; object-src 'none'; base-uri 'none'" />
    <title>FUWA 黃推之路</title>
    <link rel="stylesheet" href="./assets/public.css" />
    <style id="theme-vars">:root {
  --bg: #0b1020;
  --bg-soft: rgba(18, 24, 44, 0.82);
  --panel: rgba(22, 30, 56, 0.78);
  --line: rgba(148, 163, 184, 0.18);
  --text: #eef2ff;
  --muted: #94a3b8;
  --accent: #38bdf8;
  --accent-2: #a78bfa;
  --good: #34d399;
  --warn: #fbbf24;
  --danger: #fb7185;
  --radius: 18px;
  --font: "IBM Plex Sans", "Segoe UI", sans-serif;
  --shadow: 0 24px 80px rgba(2, 6, 23, 0.45);
}
.backdrop { background: radial-gradient(circle at 12% 18%, rgba(56,189,248,0.18), transparent 34%), radial-gradient(circle at 88% 12%, rgba(167,139,250,0.16), transparent 30%), linear-gradient(180deg, #0b1020 0%, #111827 100%); }
html { color-scheme: dark; }</style>
  </head>
  <body>
    <div class="backdrop"></div>
    <main class="shell">
      <header class="dashboard-hero">
        <div class="brand-row">
          <span class="brand-mark">FUWA</span>
          <span class="brand-caption">PUBLIC TRAINING LOG</span>
        </div>
        <div class="hero-copy">
          <div>
            <p class="eyebrow" id="month-label">本月概況</p>
            <h1>黃推之路</h1>
            <p class="hero-note">合作排程、科技測試、體能與醫療追蹤。</p>
          </div>
          <dl class="month-summary">
            <div>
              <dt>本月預計合作</dt>
              <dd><strong id="month-partner-count">0</strong><span>人</span></dd>
            </div>
            <div>
              <dt>本月排程</dt>
              <dd><strong id="month-event-count">0</strong><span>場</span></dd>
            </div>
          </dl>
        </div>
      </header>

      <section class="dashboard-section schedule-section" aria-labelledby="schedule-title">
        <div class="section-heading">
          <div><span>CALENDAR</span><h2 id="schedule-title">本月合作</h2></div>
          <span class="section-meta" id="schedule-month"></span>
        </div>
        <div id="month-schedule" class="schedule-list"></div>
      </section>

      <section class="dashboard-section" aria-labelledby="technology-title">
        <div class="section-heading">
          <div><span>TECHNOLOGY</span><h2 id="technology-title">科技</h2></div>
          <p>個人測試紀錄</p>
        </div>
        <div id="medication-grid" class="medication-grid"></div>
      </section>

      <section class="dashboard-section" aria-labelledby="fitness-title">
        <div class="section-heading">
          <div><span>PHYSICAL</span><h2 id="fitness-title">體能</h2></div>
          <p>最新訓練狀態</p>
        </div>
        <div id="fitness-grid" class="fitness-grid"></div>
      </section>

      <section class="dashboard-section" aria-labelledby="medical-title">
        <div class="section-heading">
          <div><span>MEDICAL</span><h2 id="medical-title">醫療</h2></div>
          <p>專業追蹤</p>
        </div>
        <div id="urology-card" class="medical-card"></div>
      </section>

      <footer class="site-footer">
        <span>FUWA 黃推之路</span>
        <p>藥物與醫療內容為個人追蹤紀錄，不構成醫療建議。</p>
      </footer>
    </main>
    <script id="site-data" type="application/json">{"collaborations": [], "medication_logs": [], "fitness_logs": [], "urology": {"last_visit": "", "next_visit": "", "recommendation": ""}}</script>
    <script src="./assets/public.js"></script>
  </body>
</html>
